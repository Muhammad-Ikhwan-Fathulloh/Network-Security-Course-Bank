limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name localhost;
    
    # Hide Nginx version
    server_tokens off;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Protected API Path
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        # Block Sensitive Path Access
        if ($request_uri ~* "(config|sensitive|backup|\.sql|phpinfo|\/\.git)") {
            return 403;
        }
        
        # SQL Injection & XSS Protection
        if ($query_string ~* "(union|select|insert|delete|update|drop|--|'|\"|<script|alert|eval)") {
            return 400;
        }
        
        proxy_pass http://backend-protected:80/api.php/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Hide Backend Headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
    
    # Block direct PHP file access except via /api/
    location ~ \.php$ {
        # Only allow if accessed via internal proxying or specific rules
        return 403;
    }
    
    # Block internal and dot files
    location ~ /\. {
        return 403;
    }
    
    # Block database and log files
    location ~* \.(sql|bak|backup|log|sh)$ {
        return 403;
    }
}
