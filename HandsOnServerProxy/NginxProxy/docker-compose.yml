version: '3.8'

services:
  backend-exposed:
    build: ./backend-php
    container_name: php-backend-exposed
    ports:
      - "5000:80"
    environment:
      - ENVIRONMENT=development
      - PHP_INI_SCAN_DIR=/usr/local/etc/php/conf.d
    networks:
      - public-net

  backend-protected:
    build: ./backend-php
    container_name: php-backend-protected
    expose:
      - "80"
    environment:
      - ENVIRONMENT=production
    networks:
      - internal-net

  frontend:
    build: ./frontend-js
    container_name: js-frontend
    expose:
      - "80"
    networks:
      - internal-net

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx-proxy/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend-protected
    networks:
      - internal-net
      - public-net

networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true