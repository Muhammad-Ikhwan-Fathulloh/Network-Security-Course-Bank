version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: project2-database
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: userdb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data2:/var/lib/mysql
    restart: unless-stopped
    networks:
      - internal

  backend:
    build: ./backend-php
    container_name: project2-backend
    expose:
      - "80"
    depends_on:
      - database
    environment:
      DB_HOST: database
      DB_NAME: userdb
      DB_USER: user
      DB_PASS: password
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build: ./frontend-js
    container_name: project2-frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - internal

  nginx-proxy:
    image: nginx:alpine
    container_name: project2-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - internal
      - public

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  db_data2:

