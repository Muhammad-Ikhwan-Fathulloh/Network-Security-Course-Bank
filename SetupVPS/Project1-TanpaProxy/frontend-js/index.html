<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online - Tanpa Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .status {
            display: inline-block;
            padding: 8px 16px;
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .info-box {
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .product-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .product-price {
            font-size: 24px;
            color: #10b981;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 50px;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .server-info {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .server-info h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .server-info p {
            color: #666;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Toko Online</h1>
            <span class="status">Mode: Tanpa Proxy</span>
            <div class="info-box">
                <strong>📌 Catatan:</strong> Frontend berkomunikasi langsung dengan backend tanpa melalui proxy.
            </div>
        </header>

        <div id="loading" class="loading">Memuat data produk...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="products" class="products-grid"></div>

        <div id="server-info" class="server-info" style="display: none;">
            <h3>ℹ️ Informasi Server</h3>
            <p><strong>Server:</strong> <span id="server-type"></span></p>
            <p><strong>Mode:</strong> <span id="server-mode"></span></p>
            <p><strong>Waktu Server:</strong> <span id="server-time"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
